<script>
  const FORMSPREE_URL = "https://formspree.io/f/xojykdkb";

  function ouvrirQuestionnaire() {
    const wrap = document.getElementById('questionnaire-wrap');
    wrap.style.display = 'block';
    const btn = document.getElementById('btn-postule');
    btn.textContent = '✓ Formulaire ouvert ci-dessous';
    btn.style.background = 'rgba(255,255,255,0.12)';
    btn.style.color = '#7aaa8a';
    btn.style.boxShadow = 'none';
    btn.disabled = true;
    setTimeout(() => wrap.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }

  const pages = [
    {
      label: "Étape 1 sur 5",
      questions: [
        {
          key: "pc", type: "options",
          title: "As-tu un PC portable ou fixe à disposition ?",
          options: [
            { num: "1", text: "J'ai un PC portable" },
            { num: "2", text: "J'ai un PC fixe" }
          ]
        },
        {
          key: "niveau_live", type: "options",
          title: "Où en es-tu avec les Lives TikTok ?",
          options: [
            { num: "0", text: "Je ne sais pas encore si ça m'intéresse" },
            { num: "1", text: "Je viens de découvrir les lives interactifs et je veux me lancer" },
            { num: "2", text: "J'ai des connaissances mais je n'ai jamais commencé" },
            { num: "3", text: "J'ai lancé 1 live mais je ne comprends pas l'interactif" },
            { num: "4", text: "J'ai fait plusieurs lives mais j'ai peu de visibilité" },
            { num: "5", text: "J'ai de la visibilité mais je génère peu d'argent — je veux scaler" }
          ]
        }
      ]
    },
    {
      label: "Étape 2 sur 5",
      questions: [
        {
          key: "situation_pro", type: "options",
          title: "Quelle est ta situation professionnelle ?",
          options: [
            { num: "A", text: "Étudiant(e)" },
            { num: "B", text: "Sans emploi" },
            { num: "C", text: "Salarié(e)" },
            { num: "D", text: "Entrepreneur(e)" },
            { num: "E", text: "Autre" }
          ]
        }
      ]
    },
    {
      label: "Étape 3 sur 5",
      questions: [
        {
          key: "budget", type: "options",
          title: "Combien es-tu prêt(e) à investir aujourd'hui ?",
          options: [
            { num: "💡", text: "300€ – 1 000€ · Je comprends l'importance d'investir dans mes connaissances" },
            { num: "🚀", text: "1 000€ – 2 000€ · Je veux être accompagné(e) par Jafar, Aztro et leur équipe" },
            { num: "🔥", text: "+2 000€ · Je suis prêt(e) à m'investir pleinement pour réussir" }
          ]
        }
      ]
    },
    {
      label: "Étape 4 sur 5",
      questions: [
        {
          key: "prenom", type: "text",
          title: "Quel est ton prénom ?",
          placeholder: "Répondez ici"
        },
        {
          key: "age", type: "options",
          title: "Quel est ton âge ?",
          options: [
            { num: "1", text: "16 – 18 ans" },
            { num: "2", text: "18 – 24 ans" },
            { num: "3", text: "25 – 30 ans" },
            { num: "4", text: "+30 ans" }
          ]
        }
      ]
    },
    {
      label: "Étape 5 sur 5",
      questions: [
        {
          key: "telephone", type: "text",
          title: "Ton numéro de téléphone",
          placeholder: "Répondez ici"
        },
        {
          key: "discord", type: "text",
          title: "Ton pseudo Discord",
          placeholder: "Répondez ici",
          hint: "Vérifie bien à mettre le bon @votre-pseudo"
        },
        {
          key: "email", type: "text",
          title: "Ton adresse email",
          placeholder: "Répondez ici"
        }
      ]
    }
  ];

  const labels = {
    pc: "Équipement",
    niveau_live: "Niveau Lives",
    situation_pro: "Situation pro",
    budget: "Budget",
    prenom: "Prénom",
    age: "Âge",
    telephone: "Téléphone",
    discord: "Discord",
    email: "Email"
  };

  let current = 0;
  let answers = {};

  function renderPbar() {
    document.getElementById('pbar').innerHTML = pages.map((_, i) => {
      let cls = 'pb';
      if (i < current) cls += ' done';
      else if (i === current) cls += ' active';
      return `<div class="${cls}"></div>`;
    }).join('');
  }

  function renderPage() {
    if (current >= pages.length) { renderResult(); return; }
    renderPbar();
    const page = pages[current];
    let html = `<div class="step-label animate-in">${page.label}</div>`;

    page.questions.forEach((q, qi) => {
      if (qi > 0) html += `<div class="q-divider"></div>`;
      html += `<div class="q-block animate-in" style="animation-delay:${qi * 0.06}s">`;
      html += `<div class="q-title">${q.title}</div>`;

      if (q.type === 'text') {
        html += `<div class="text-field-wrap">
          <input class="text-field" id="field_${q.key}" type="text"
            placeholder="${q.placeholder}" value="${answers[q.key] || ''}"
            oninput="answers['${q.key}'] = this.value" />
          ${q.hint ? `<div class="field-hint">⚠️ ${q.hint}</div>` : ''}
        </div>`;
      } else {
        html += `<div class="options" id="opts_${q.key}">`;
        q.options.forEach(o => {
          const sel = answers[q.key] === o.text ? ' selected' : '';
          const safe = o.text.replace(/'/g, "\\'");
          html += `<button class="opt${sel}" onclick="pick('${q.key}','${safe}',this)">
            <span class="opt-badge">${o.num}</span>
            <span class="opt-text">${o.text}</span>
          </button>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    });

    html += `<div class="nav animate-in" style="animation-delay:0.15s">`;
    if (current > 0) html += `<button class="btn-back" onclick="goBack()">← Retour</button>`;
    html += `<span class="error-msg" id="errmsg">Remplis tous les champs</span>`;
    const isLast = current === pages.length - 1;
    html += `<button class="btn-next" id="btn-next" onclick="nextPage()">${isLast ? 'Envoyer ✓' : 'Continuer →'}</button>`;
    html += `</div>`;

    document.getElementById('content').innerHTML = html;
  }

  function pick(key, val, btn) {
    answers[key] = val;
    document.getElementById('opts_' + key).querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    const err = document.getElementById('errmsg');
    if (err) err.classList.remove('show');
  }

  function allAnswered() {
    for (const q of pages[current].questions) {
      if (q.type === 'text') {
        const el = document.getElementById('field_' + q.key);
        if (el) answers[q.key] = el.value.trim();
        if (!answers[q.key]) return false;
      } else {
        if (!answers[q.key]) return false;
      }
    }
    return true;
  }

  async function envoyerFormspree() {
    const data = {
      Prénom:         answers.prenom       || '-',
      Âge:            answers.age          || '-',
      Équipement:     answers.pc           || '-',
      "Niveau Lives": answers.niveau_live  || '-',
      "Situation pro":answers.situation_pro|| '-',
      Budget:         answers.budget       || '-',
      Téléphone:      answers.telephone    || '-',
      Discord:        answers.discord      || '-',
      Email:          answers.email        || '-'
    };

    const response = await fetch(FORMSPREE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(data)
    });

    if (!response.ok) throw new Error('Formspree error');
  }

  function nextPage() {
    if (!allAnswered()) {
      const err = document.getElementById('errmsg');
      if (err) err.classList.add('show');
      return;
    }

    const isLast = current === pages.length - 1;

    if (isLast) {
      const btn = document.getElementById('btn-next');
      btn.disabled = true;
      btn.textContent = 'Envoi en cours…';

      envoyerFormspree()
        .then(() => {
          current++;
          renderPage();
          document.getElementById('questionnaire-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
        })
        .catch(() => {
          btn.disabled = false;
          btn.textContent = 'Envoyer ✓';
          const errMsg = document.getElementById('errmsg');
          if (errMsg) {
            errMsg.textContent = "Erreur d'envoi, réessaie.";
            errMsg.classList.add('show');
          }
        });
    } else {
      current++;
      renderPage();
      document.getElementById('questionnaire-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  function goBack() {
    if (current > 0) { current--; renderPage(); }
  }

  function renderResult() {
    renderPbar();
    let rows = Object.entries(answers).map(([k, v]) =>
      `<div class="s-row"><span class="s-lbl">${labels[k] || k}</span><span class="s-val">${v}</span></div>`
    ).join('');
    document.getElementById('content').innerHTML = `
      <div class="result animate-in">
        <div class="result-icon">✅</div>
        <div class="result-title">Merci ${answers.prenom || ''} !</div>
        <div class="result-sub">Tes réponses ont bien été enregistrées.<br>L'équipe Grindlab va te contacter très rapidement.</div>
        <div class="summary">${rows}</div>
        <button class="btn-restart" onclick="restart()">Recommencer</button>
      </div>`;
  }

  function restart() {
    current = 0; answers = {};
    const btn = document.getElementById('btn-postule');
    btn.textContent = 'POSTULE MAINTENANT';
    btn.style.background = '#ffffff';
    btn.style.color = '#004526';
    btn.style.boxShadow = '0 6px 30px rgba(255,255,255,0.18)';
    btn.disabled = false;
    document.getElementById('questionnaire-wrap').style.display = 'none';
    renderPage();
  }

  renderPage();
</script>


</body></html>
