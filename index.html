<html lang="fr"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postule – GRINDLAB V10</title>
<link href="./Postule – GRINDLAB V10_files/css2" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #004526;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1rem;
  }

  /* ── SECTION BOUTON ── */
  #hero {
    text-align: center;
    padding: 2rem 1rem;
  }

  .hero-title {
    font-size: 1.1rem;
    color: #b8d8c4;
    margin-bottom: 0.4rem;
  }

  .hero-sub {
    font-size: 0.85rem;
    color: #7aaa8a;
    margin-bottom: 2rem;
  }

  #btn-postule {
    background: #ffffff;
    color: #004526;
    border: none;
    border-radius: 10px;
    padding: 0.85rem 2.4rem;
    font-size: 1rem;
    font-weight: 800;
    font-family: 'Inter', sans-serif;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(255,255,255,0.2);
    text-transform: uppercase;
  }
  #btn-postule:hover {
    background: #e0e0e0;
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(255,255,255,0.3);
  }

  .hero-hint {
    font-size: 12px;
    color: #5a9a70;
    margin-top: 0.75rem;
  }

  /* ── QUESTIONNAIRE (caché par défaut) ── */
  #questionnaire-wrap {
    display: none;
    width: 100%;
    max-width: 560px;
    margin-top: 2rem;
    animation: fadeUp 0.35s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 3px;
    color: #ffffff;
    text-align: center;
    margin-bottom: 1.2rem;
    opacity: 0.8;
  }

  .card {
    background: #003a1f;
    border: 1px solid #2a6040;
    border-radius: 16px;
    padding: 2rem;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  }

  .progress-wrap { display: flex; gap: 8px; margin-bottom: 0.6rem; }
  .pb { flex: 1; height: 3px; border-radius: 2px; background: #1e4d2a; transition: background 0.4s; }
  .pb.done { background: #ffffff; }
  .pb.active { background: #ffffff88; }

  .step-label { font-size: 11px; color: #7aaa8a; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 1.5rem; }

  .q-title { font-size: 1rem; font-weight: 700; color: #e8f5ec; line-height: 1.45; margin-bottom: 0.9rem; }

  .options { display: flex; flex-direction: column; gap: 7px; }

  .opt {
    display: flex; align-items: flex-start; gap: 10px;
    background: #004020; border: 1.5px solid #2a6040; border-radius: 10px;
    padding: 0.7rem 1rem; cursor: pointer;
    transition: border-color 0.18s, background 0.18s, transform 0.12s;
    text-align: left; width: 100%; outline: none;
  }
  .opt:hover { border-color: #ffffff; background: #005030; transform: translateX(2px); }
  .opt.selected { border-color: #ffffff; background: #005030; }

  .opt-badge {
    flex-shrink: 0; width: 24px; height: 24px; border-radius: 6px;
    background: #003a1f; border: 1px solid #3a7050;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; color: #ffffff; margin-top: 1px;
    transition: background 0.18s, border-color 0.18s;
  }
  .opt.selected .opt-badge { background: #ffffff; color: #004526; border-color: #ffffff; }
  .opt-text { font-size: 0.875rem; color: #b8d8c4; line-height: 1.45; }
  .opt.selected .opt-text { color: #fff; }

  .q-divider { height: 1px; background: #1e4d2a; margin: 1.5rem 0; }

  .nav {
    display: flex; align-items: center; gap: 10px;
    margin-top: 1.75rem; padding-top: 1.5rem;
    border-top: 1px solid #1e4d2a;
  }
  .btn-back {
    background: transparent; border: 1.5px solid #2a6040; color: #7aaa8a;
    border-radius: 8px; padding: 0.6rem 1rem; font-size: 0.875rem;
    font-family: 'Inter', sans-serif; cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-back:hover { border-color: #ffffff; color: #ffffff; }

  .btn-next {
    background: #ffffff; color: #004526; border: none; border-radius: 8px;
    padding: 0.65rem 1.6rem; font-size: 0.9rem; font-weight: 800;
    font-family: 'Inter', sans-serif; letter-spacing: 0.5px; cursor: pointer;
    transition: background 0.15s, transform 0.1s; margin-left: auto;
  }
  .btn-next:hover { background: #e0e0e0; transform: translateY(-1px); }

  .error-msg { font-size: 12px; color: #e07070; margin-left: auto; display: none; }
  .error-msg.show { display: block; }

  /* Result */
  .result { text-align: center; padding: 0.5rem 0; }
  .result-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: #ffffff; letter-spacing: 2px; margin-bottom: 0.4rem; }
  .result-sub { font-size: 0.9rem; color: #7aaa8a; line-height: 1.6; margin-bottom: 1.75rem; }
  .summary { background: #004020; border: 1px solid #2a6040; border-radius: 12px; padding: 1rem 1.25rem; text-align: left; }
  .s-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; padding: 0.45rem 0; font-size: 0.82rem; border-bottom: 1px solid #1e4d2a; }
  .s-row:last-child { border-bottom: none; }
  .s-lbl { color: #7aaa8a; white-space: nowrap; flex-shrink: 0; }
  .s-val { color: #e8f5ec; font-weight: 600; text-align: right; }
  .btn-restart { margin-top: 1.5rem; background: transparent; border: 1.5px solid #2a6040; color: #7aaa8a; border-radius: 8px; padding: 0.55rem 1.4rem; font-size: 0.85rem; font-family: 'Inter', sans-serif; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  .btn-restart:hover { border-color: #ffffff; color: #ffffff; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .animate-in { animation: fadeIn 0.28s ease both; }
</style>
</head>
<body>

<!-- SECTION BOUTON -->
<div id="hero">
  <p class="hero-title">Postule pour travailler avec moi en dessous</p>
  <p class="hero-sub">Et rejoins les +600 managers que j'ai accompagnés</p>
  <button id="btn-postule" onclick="ouvrirQuestionnaire()">POSTULE MAINTENANT</button>
  <p class="hero-hint">⏱ Prend 30 secondes</p>
</div>

<!-- QUESTIONNAIRE (caché au départ) -->
<div id="questionnaire-wrap">
  <div class="brand">GRINDLAB V10</div>
  <div class="card" id="card">
    <div class="progress-wrap" id="pbar"><div class="pb active"></div><div class="pb"></div><div class="pb"></div></div>
    <div id="content"><div class="step-label animate-in">Étape 1 sur 3</div><div class="animate-in" style="animation-delay:0s"><div class="q-title">As-tu un PC portable ou fixe à disposition ?</div><div class="options" id="opts_pc"><button class="opt" onclick="pick(&#39;pc&#39;,&#39;J\&#39;ai un PC portable&#39;,this)">
        <span class="opt-badge">1</span>
        <span class="opt-text">J'ai un PC portable</span>
      </button><button class="opt" onclick="pick(&#39;pc&#39;,&#39;J\&#39;ai un PC fixe&#39;,this)">
        <span class="opt-badge">2</span>
        <span class="opt-text">J'ai un PC fixe</span>
      </button></div></div><div class="q-divider"></div><div class="animate-in" style="animation-delay:0.06s"><div class="q-title">Aujourd'hui, quelle situation te correspond le plus dans les Lives ?</div><div class="options" id="opts_niveau_live"><button class="opt" onclick="pick(&#39;niveau_live&#39;,&#39;Je n\&#39;ai pas suffisamment de connaissances pour savoir si cela m\&#39;intéresse&#39;,this)">
        <span class="opt-badge">0</span>
        <span class="opt-text">Je n'ai pas suffisamment de connaissances pour savoir si cela m'intéresse</span>
      </button><button class="opt" onclick="pick(&#39;niveau_live&#39;,&#39;Je viens de découvrir les lives interactifs et je veux me lancer&#39;,this)">
        <span class="opt-badge">1</span>
        <span class="opt-text">Je viens de découvrir les lives interactifs et je veux me lancer</span>
      </button><button class="opt" onclick="pick(&#39;niveau_live&#39;,&#39;J\&#39;ai quelques connaissances dans le domaine mais je n\&#39;ai jamais commencé&#39;,this)">
        <span class="opt-badge">2</span>
        <span class="opt-text">J'ai quelques connaissances dans le domaine mais je n'ai jamais commencé</span>
      </button><button class="opt" onclick="pick(&#39;niveau_live&#39;,&#39;J\&#39;ai déjà lancé 1 live mais je ne comprends pas comment faire de l\&#39;interactif&#39;,this)">
        <span class="opt-badge">3</span>
        <span class="opt-text">J'ai déjà lancé 1 live mais je ne comprends pas comment faire de l'interactif</span>
      </button><button class="opt" onclick="pick(&#39;niveau_live&#39;,&#39;J\&#39;ai déjà fait plusieurs lives mais j\&#39;ai peu ou pas assez de visibilité&#39;,this)">
        <span class="opt-badge">4</span>
        <span class="opt-text">J'ai déjà fait plusieurs lives mais j'ai peu ou pas assez de visibilité</span>
      </button><button class="opt" onclick="pick(&#39;niveau_live&#39;,&#39;J\&#39;ai de la visibilité mais je génère peu d\&#39;argent — je veux scaler et réussir davantage&#39;,this)">
        <span class="opt-badge">5</span>
        <span class="opt-text">J'ai de la visibilité mais je génère peu d'argent — je veux scaler et réussir davantage</span>
      </button></div></div><div class="nav animate-in" style="animation-delay:0.15s"><span class="error-msg" id="errmsg">Réponds à toutes les questions</span><button class="btn-next" onclick="nextPage()">Continuer →</button></div></div>
  </div>
</div>

<script>
function ouvrirQuestionnaire() {
  const wrap = document.getElementById('questionnaire-wrap');
  wrap.style.display = 'block';
  document.getElementById('btn-postule').textContent = '✓ Formulaire ouvert ci-dessous';
  document.getElementById('btn-postule').style.background = '#2a6040';
  document.getElementById('btn-postule').style.color = '#b8d8c4';
  document.getElementById('btn-postule').style.boxShadow = 'none';
  document.getElementById('btn-postule').disabled = true;
  setTimeout(() => wrap.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

const pages = [
  {
    label: "Étape 1 sur 3",
    questions: [
      {
        key: "pc",
        title: "As-tu un PC portable ou fixe à disposition ?",
        options: [
          { num: "1", text: "J'ai un PC portable" },
          { num: "2", text: "J'ai un PC fixe" }
        ]
      },
      {
        key: "niveau_live",
        title: "Aujourd'hui, quelle situation te correspond le plus dans les Lives ?",
        options: [
          { num: "0", text: "Je n'ai pas suffisamment de connaissances pour savoir si cela m'intéresse" },
          { num: "1", text: "Je viens de découvrir les lives interactifs et je veux me lancer" },
          { num: "2", text: "J'ai quelques connaissances dans le domaine mais je n'ai jamais commencé" },
          { num: "3", text: "J'ai déjà lancé 1 live mais je ne comprends pas comment faire de l'interactif" },
          { num: "4", text: "J'ai déjà fait plusieurs lives mais j'ai peu ou pas assez de visibilité" },
          { num: "5", text: "J'ai de la visibilité mais je génère peu d'argent — je veux scaler et réussir davantage" }
        ]
      }
    ]
  },
  {
    label: "Étape 2 sur 3",
    questions: [
      {
        key: "situation_pro",
        title: "Quelle est ta situation professionnelle actuelle ?",
        options: [
          { num: "A", text: "Étudiant(e)" },
          { num: "B", text: "Sans emploi" },
          { num: "C", text: "Salarié(e)" },
          { num: "D", text: "Entrepreneur(e)" },
          { num: "E", text: "Autre" }
        ]
      }
    ]
  },
  {
    label: "Étape 3 sur 3",
    questions: [
      {
        key: "budget",
        title: "Combien es-tu prêt(e) à investir AUJOURD'HUI pour atteindre tes objectifs ?",
        options: [
          { num: "💡", text: "300€ – 1 000€ · Je comprends l'importance d'investir dans mes connaissances" },
          { num: "🚀", text: "1 000€ – 2 000€ · Je veux les meilleures infos et être accompagné(e) par Jafar, Aztro et son équipe" },
          { num: "🔥", text: "+2 000€ · Je suis prêt(e) à m'investir activement et je souhaite réussir plus que tout" }
        ]
      }
    ]
  }
];

const labels = { pc: "Équipement", niveau_live: "Niveau Lives", situation_pro: "Situation pro", budget: "Budget" };
let current = 0;
let answers = {};

function renderPbar() {
  document.getElementById('pbar').innerHTML = pages.map((_, i) => {
    let cls = 'pb';
    if (i < current) cls += ' done';
    else if (i === current) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');
}

function renderPage() {
  if (current >= pages.length) { renderResult(); return; }
  renderPbar();
  const page = pages[current];
  let html = `<div class="step-label animate-in">${page.label}</div>`;
  page.questions.forEach((q, qi) => {
    if (qi > 0) html += `<div class="q-divider"></div>`;
    html += `<div class="animate-in" style="animation-delay:${qi * 0.06}s">`;
    html += `<div class="q-title">${q.title}</div>`;
    html += `<div class="options" id="opts_${q.key}">`;
    q.options.forEach(o => {
      const sel = answers[q.key] === o.text ? ' selected' : '';
      const safe = o.text.replace(/'/g, "\\'");
      html += `<button class="opt${sel}" onclick="pick('${q.key}','${safe}',this)">
        <span class="opt-badge">${o.num}</span>
        <span class="opt-text">${o.text}</span>
      </button>`;
    });
    html += `</div></div>`;
  });
  html += `<div class="nav animate-in" style="animation-delay:0.15s">`;
  if (current > 0) html += `<button class="btn-back" onclick="goBack()">← Retour</button>`;
  html += `<span class="error-msg" id="errmsg">Réponds à toutes les questions</span>`;
  const isLast = current === pages.length - 1;
  html += `<button class="btn-next" onclick="nextPage()">${isLast ? 'Envoyer ✓' : 'Continuer →'}</button>`;
  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

function pick(key, val, btn) {
  answers[key] = val;
  document.getElementById('opts_' + key).querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const err = document.getElementById('errmsg');
  if (err) err.classList.remove('show');
}

function allAnswered() {
  return pages[current].questions.every(q => answers[q.key] !== undefined);
}

function nextPage() {
  if (!allAnswered()) {
    const err = document.getElementById('errmsg');
    if (err) err.classList.add('show');
    return;
  }
  current++;
  renderPage();
  document.getElementById('questionnaire-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function goBack() {
  if (current > 0) { current--; renderPage(); }
}

function renderResult() {
  renderPbar();
  let rows = Object.entries(answers).map(([k, v]) =>
    `<div class="s-row"><span class="s-lbl">${labels[k] || k}</span><span class="s-val">${v}</span></div>`
  ).join('');
  document.getElementById('content').innerHTML = `
    <div class="result animate-in">
      <div style="font-size:2.5rem;margin-bottom:.75rem">✅</div>
      <div class="result-title">Merci !</div>
      <div class="result-sub">Tes réponses ont bien été enregistrées.<br>L'équipe Grindlab va te contacter très rapidement.</div>
      <div class="summary">${rows}</div>
      <button class="btn-restart" onclick="restart()">Recommencer</button>
    </div>`;
}

function restart() {
  current = 0; answers = {};
  document.getElementById('btn-postule').textContent = 'POSTULE MAINTENANT';
  document.getElementById('btn-postule').style.background = '#ffffff';
  document.getElementById('btn-postule').style.color = '#004526';
  document.getElementById('btn-postule').style.boxShadow = '0 4px 20px rgba(255,255,255,0.2)';
  document.getElementById('btn-postule').disabled = false;
  document.getElementById('questionnaire-wrap').style.display = 'none';
  renderPage();
}

renderPage();
</script>


</body></html>
